<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sydney Trip Plan</title>
    <link rel="stylesheet" href="styles.css?v=20260705-sydney1">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p id="trip-range">2026.08.10 - 08.16</p>
        <h1 id="trip-title">Sydney Trip Plan</h1>
      </div>
      <label class="edit-toggle">
        <input id="edit-mode" type="checkbox">
        <span>編集</span>
      </label>
    </header>

    <nav class="jump-nav" id="date-jump" aria-label="日付ジャンプ"></nav>

    <main class="shell">
      <section class="hero-card">
        <div>
          <p class="eyebrow">旅行中に見る用</p>
          <h2>マニラ乗継・シドニー旅程</h2>
          <p id="timezone-note">時刻は各現地時刻</p>
        </div>
        <button id="reset-data" class="subtle-button" type="button">初期状態に戻す</button>
      </section>

      <section class="panel alert-panel" aria-labelledby="alert-title">
        <div class="section-head">
          <h2 id="alert-title">重要アラート</h2>
          <span id="alert-count">0</span>
        </div>
        <div id="alerts" class="alert-list"></div>
      </section>

      <section class="summary-grid">
        <article class="panel">
          <div class="section-head">
            <h2>フライト概要</h2>
          </div>
          <div id="flight-summary" class="flight-list"></div>
        </article>
        <article class="panel">
          <div class="section-head">
            <h2>ホテル</h2>
          </div>
          <div id="hotel-summary" class="hotel-card"></div>
        </article>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>日別タイムライン</h2>
          <p id="edit-help">通常は閲覧専用。編集ONで時刻・日付・並び替えを変更できます。</p>
        </div>
        <div id="timeline" class="days"></div>
      </section>

      <section class="summary-grid">
        <article class="panel">
          <div class="section-head">
            <h2>地図リンク</h2>
          </div>
          <div id="map-links" class="map-links"></div>
        </article>
        <article class="panel">
          <div class="section-head">
            <h2>持ち物</h2>
            <span id="checklist-progress">0/0</span>
          </div>
          <div id="checklist" class="checklist"></div>
        </article>
      </section>
    </main>

    <script src="sydney-trip-data.js?v=20260705-sydney1"></script>
    <script src="app.js?v=20260705-sydney1" defer></script>
  </body>
</html>
