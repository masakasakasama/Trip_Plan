<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Trip Studio</title>
    <link rel="stylesheet" href="styles.css?v=20260704-todos1">
  </head>
  <body>
    <main class="stage">
      <p class="theme-label"><span>1b</span>すっきりタイムライン</p>

      <section class="phone" aria-label="Trip Studio">
        <div class="notch"></div>

        <header class="app-header">
          <button class="ghost-button" id="trip-switcher" type="button" aria-label="Trip切替">⌄</button>
          <div>
            <p id="trip-dates">2026・8.1 - 8.10</p>
            <h1 id="trip-title">Australia 2026</h1>
          </div>
          <button class="ghost-button" id="sync-settings" type="button" aria-label="共有リンク">🔗</button>
        </header>

        <section class="soft-card status-card">
          <div class="weather-icon">☀️</div>
          <div>
            <strong id="trip-place">Sydney・晴れ 26°</strong>
            <p id="sync-status">自動同期を準備中</p>
          </div>
          <div class="countdown">
            <span>あと</span>
            <strong id="countdown-days">--日</strong>
          </div>
        </section>

        <nav class="day-tabs" id="day-tabs" aria-label="日付"></nav>

        <section class="view is-active" id="view-home" aria-label="ホーム">
          <div class="timeline" id="timeline"></div>
          <div class="progress-grid">
            <article class="progress-card pink">
              <div><strong>やること</strong><span id="packing-score">0%</span></div>
              <meter min="0" max="100" value="75"></meter>
            </article>
            <article class="progress-card blue">
              <div><strong>予算</strong><span id="budget-score">52%</span></div>
              <meter min="0" max="100" value="52"></meter>
            </article>
          </div>
        </section>

        <section class="view" id="view-todos" aria-label="やること">
          <div class="section-title">
            <h2>やること</h2>
            <button id="add-todo" type="button">追加</button>
          </div>
          <div class="todo-summary" id="todo-summary"></div>
          <div class="stack-list" id="todo-list"></div>
        </section>

        <section class="view" id="view-itinerary" aria-label="旅程">
          <div class="section-title">
            <h2>旅程</h2>
            <button id="add-day" type="button">日を追加</button>
          </div>
          <div class="stack-list" id="day-list"></div>
        </section>

        <section class="view" id="view-spots" aria-label="スポット">
          <div class="section-title">
            <h2>スポット</h2>
            <button id="add-spot" type="button">追加</button>
          </div>
          <button class="map-search" id="open-map-search" type="button">Google Mapsで探す</button>
          <div class="stack-list" id="spot-list"></div>
        </section>

        <nav class="bottom-nav" aria-label="メインナビ">
          <button class="is-active" data-view="home" type="button"><span>🏠</span>ホーム</button>
          <button data-view="todos" type="button"><span>✅</span>やること</button>
          <button data-view="itinerary" type="button"><span>🗓️</span>旅程</button>
          <button data-view="spots" type="button"><span>📍</span>スポット</button>
        </nav>
      </section>
    </main>

    <dialog id="trip-dialog">
      <form method="dialog">
        <div class="dialog-head">
          <h2>Trip</h2>
          <button type="submit">閉じる</button>
        </div>
        <div id="trip-list" class="trip-list"></div>
        <button id="new-trip" class="wide-action" type="button">新しいTripを作る</button>
      </form>
    </dialog>

    <dialog id="settings-dialog">
      <form method="dialog">
        <div class="dialog-head">
          <h2>同期設定</h2>
          <button type="submit">閉じる</button>
        </div>
        <p class="hint">このリンクを開いた端末は同じTripに自動同期します。別PC・別ブラウザ・スマホはこのリンクを共有。</p>
        <label>共有リンク<input id="share-link" type="text" readonly></label>
        <div class="dialog-actions">
          <button id="copy-share-link" class="wide-action" type="button">リンクをコピー</button>
          <button id="save-now" type="button">今すぐ同期</button>
        </div>
        <details class="advanced-sync">
          <summary>同期キーを差し替える</summary>
          <label>GitHub token<input id="github-token" type="password" autocomplete="off" placeholder="github_pat_..."></label>
          <div class="dialog-actions">
            <button id="save-token" class="wide-action" type="button">保存する</button>
            <button id="clear-token" type="button">削除</button>
          </div>
        </details>
      </form>
    </dialog>

    <script src="app.js?v=20260704-todos1" defer></script>
  </body>
</html>
