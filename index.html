<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ふたりの旅プラン</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="hero" aria-labelledby="trip-title">
        <div class="hero__photo" role="img" aria-label="旅ノートと花の写真"></div>
        <div class="hero__body">
          <div class="sync-pill" id="sync-status">GitHubから読み込み中</div>
          <h1 id="trip-title">ふたりの旅プラン</h1>
          <p id="trip-mood"></p>
          <div class="hero__facts" id="trip-facts"></div>
        </div>
      </section>

      <section class="toolbar" aria-label="操作">
        <button class="primary" id="save-remote" type="button">GitHubへ同期</button>
        <button id="refresh-remote" type="button">最新を読み込む</button>
        <button id="sync-settings" type="button">同期設定</button>
        <button id="export-json" type="button">JSON確認</button>
        <a id="repo-link" href="https://github.com/masakasakasama/Trip_Plan" target="_blank" rel="noreferrer">GitHub</a>
      </section>

      <section class="sync-panel" aria-live="polite">
        <div>
          <strong id="save-state">未変更</strong>
          <span id="last-updated">前回更新 未取得</span>
        </div>
        <p id="sync-help">入力内容はGitHubの trip-plan.json に保存され、同じURLを開く全デバイスに反映されます。</p>
      </section>

      <section class="layout">
        <section class="panel planner" aria-labelledby="rough-heading">
          <div class="section-head">
            <h2 id="rough-heading">ラフプラン</h2>
          </div>
          <form id="trip-form" class="form-grid">
            <label>タイトル<input name="title" autocomplete="off"></label>
            <label>行き先<input name="destination" autocomplete="off"></label>
            <label>開始日<input name="startDate" type="date"></label>
            <label>終了日<input name="endDate" type="date"></label>
            <label>予算<input name="budget" type="number" min="0" step="1000"></label>
            <label>ステータス<input name="status" autocomplete="off"></label>
            <label class="wide">旅の雰囲気<textarea name="mood" rows="3"></textarea></label>
          </form>
        </section>

        <section class="panel poi-panel" aria-labelledby="poi-heading">
          <div class="section-head">
            <h2 id="poi-heading">行きたいところ</h2>
            <button id="open-map-search" type="button">Google Mapsで探す</button>
          </div>
          <form id="poi-form" class="poi-form">
            <input name="name" placeholder="場所の名前">
            <input name="area" placeholder="エリア・住所">
            <select name="category" aria-label="カテゴリ">
              <option value="cafe">カフェ</option>
              <option value="food">ごはん</option>
              <option value="spot">観光</option>
              <option value="shop">買い物</option>
              <option value="hotel">ホテル</option>
              <option value="transport">移動</option>
            </select>
            <select name="priority" aria-label="優先度">
              <option value="high">絶対行きたい</option>
              <option value="medium">できれば</option>
              <option value="low">余裕があれば</option>
            </select>
            <input class="wide" name="mapsUrl" placeholder="Google Maps URL">
            <textarea class="wide" name="memo" rows="2" placeholder="メモ"></textarea>
            <button class="primary wide" type="submit">候補に追加</button>
          </form>
          <div class="poi-list" id="poi-list"></div>
        </section>

        <section class="panel schedule-panel" aria-labelledby="schedule-heading">
          <div class="section-head">
            <h2 id="schedule-heading">日程</h2>
            <button id="add-day" type="button">日を追加</button>
          </div>
          <div id="schedule"></div>
        </section>

        <section class="panel notes-panel" aria-labelledby="notes-heading">
          <div class="section-head">
            <h2 id="notes-heading">メモ</h2>
            <button id="add-note" type="button">追加</button>
          </div>
          <div id="notes"></div>
        </section>
      </section>
    </main>

    <dialog id="settings-dialog">
      <form method="dialog" id="settings-form">
        <div class="section-head">
          <h2>同期設定</h2>
          <button type="submit">閉じる</button>
        </div>
        <p class="dialog-copy">保存にはGitHubのFine-grained personal access tokenが必要です。Trip_Planリポジトリだけに Contents: Read and write を付けたtokenを入れてください。</p>
        <label>GitHub token<input id="github-token" type="password" autocomplete="off" placeholder="github_pat_..."></label>
        <div class="dialog-actions">
          <button class="primary" id="save-token" type="button">この端末に保存</button>
          <button id="clear-token" type="button">token削除</button>
        </div>
      </form>
    </dialog>

    <dialog id="json-dialog">
      <form method="dialog">
        <div class="section-head">
          <h2>JSON</h2>
          <button type="submit">閉じる</button>
        </div>
        <textarea id="json-output" rows="18" readonly></textarea>
      </form>
    </dialog>

    <script src="app.js" defer></script>
  </body>
</html>
